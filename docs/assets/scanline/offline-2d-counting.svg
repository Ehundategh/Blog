<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" viewBox="0 0 820 360" role="img" aria-label="离线二维数点前缀拆分示意图">
  <defs>
    <style>
      .axis{stroke:#27324a;stroke-width:2;fill:none}
      .grid{stroke:#d7dce8;stroke-width:1}
      .prefix-r{fill:#4f7cff;fill-opacity:.16;stroke:#3451b2;stroke-width:3}
      .prefix-l{fill:#f59f00;fill-opacity:.18;stroke:#d98200;stroke-width:3}
      .query{fill:#00a389;fill-opacity:.28;stroke:#00897b;stroke-width:3}
      .point{fill:#26344d}
      .scan{stroke:#e03131;stroke-width:4}
      .dash{stroke:#7c879f;stroke-width:2;stroke-dasharray:7 7}
      .label{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;fill:#1f2937}
      .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;fill:#4b5563}
      .formula{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;fill:#111827;font-weight:700}
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#27324a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="360" fill="#ffffff"/>

  <line x1="72" y1="300" x2="650" y2="300" class="axis" marker-end="url(#arrow)"/>
  <line x1="72" y1="300" x2="72" y2="55" class="axis" marker-end="url(#arrow)"/>
  <text x="656" y="306" class="label">位置 i</text>
  <text x="48" y="44" class="label">值 aᵢ</text>

  <g opacity=".65">
    <line x1="140" y1="300" x2="140" y2="58" class="grid"/>
    <line x1="210" y1="300" x2="210" y2="58" class="grid"/>
    <line x1="280" y1="300" x2="280" y2="58" class="grid"/>
    <line x1="350" y1="300" x2="350" y2="58" class="grid"/>
    <line x1="420" y1="300" x2="420" y2="58" class="grid"/>
    <line x1="490" y1="300" x2="490" y2="58" class="grid"/>
    <line x1="560" y1="300" x2="560" y2="58" class="grid"/>
    <line x1="72" y1="245" x2="650" y2="245" class="grid"/>
    <line x1="72" y1="190" x2="650" y2="190" class="grid"/>
    <line x1="72" y1="135" x2="650" y2="135" class="grid"/>
    <line x1="72" y1="80" x2="650" y2="80" class="grid"/>
  </g>

  <rect x="72" y="80" width="448" height="220" class="prefix-r"/>
  <rect x="72" y="80" width="168" height="220" class="prefix-l"/>
  <rect x="240" y="160" width="280" height="140" class="query"/>

  <line x1="240" y1="300" x2="240" y2="58" class="dash"/>
  <line x1="520" y1="300" x2="520" y2="58" class="scan"/>
  <line x1="72" y1="160" x2="650" y2="160" class="dash"/>

  <circle cx="110" cy="220" r="5" class="point"/>
  <circle cx="175" cy="130" r="5" class="point"/>
  <circle cx="260" cy="205" r="5" class="point"/>
  <circle cx="335" cy="150" r="5" class="point"/>
  <circle cx="405" cy="240" r="5" class="point"/>
  <circle cx="480" cy="105" r="5" class="point"/>
  <circle cx="555" cy="180" r="5" class="point"/>
  <circle cx="600" cy="120" r="5" class="point"/>

  <text x="242" y="325" class="small">l - 1</text>
  <text x="518" y="325" class="small">r</text>
  <text x="658" y="165" class="small">x</text>
  <text x="318" y="182" class="label">要求 [l,r] 且 aᵢ ≤ x</text>
  <text x="106" y="72" class="small">前缀 (1,l-1,x)</text>
  <text x="372" y="72" class="small">前缀 (1,r,x)</text>
  <text x="98" y="30" class="formula">Ans(l,r,x)=Ans(1,r,x)-Ans(1,l-1,x)</text>
</svg>

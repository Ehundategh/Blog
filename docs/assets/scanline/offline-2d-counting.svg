<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-label="离线二维数点前缀拆分动画">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfcff"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <style>
      .panel{fill:url(#bg);stroke:#d7e0f0;stroke-width:1.2}
      .axis{stroke:#26344d;stroke-width:2.2;fill:none;stroke-linecap:round}
      .grid{stroke:#dbe4f3;stroke-width:1}
      .prefixR{fill:#4f7cff;fill-opacity:.15;stroke:#3451b2;stroke-width:2}
      .prefixL{fill:#ffb020;fill-opacity:.20;stroke:#d98200;stroke-width:2}
      .query{fill:#00a389;fill-opacity:.22;stroke:#00897b;stroke-width:2.4}
      .scan{stroke:#e03131;stroke-width:3;stroke-linecap:round}
      .dash{stroke:#8a97ad;stroke-width:1.5;stroke-dasharray:6 8}
      .point{fill:#26344d;stroke:#fff;stroke-width:2}
      .active{fill:#e03131}
      .label{font-family:'STZhongsong','华文中宋','SimSun',serif;font-size:17px;fill:#1f2937}
      .small{font-family:'STZhongsong','华文中宋','SimSun',serif;font-size:14px;fill:#526174}
      .formula{font-family:'STZhongsong','华文中宋','SimSun',serif;font-size:19px;font-weight:700;fill:#162033}
      .math{font-family:'Latin Modern Math','Cambria Math','Times New Roman',serif;font-style:italic;font-weight:400}
      .scanGroup{animation:rMove 6.8s infinite ease-in-out}
      .activePoints{animation:pulse 6.8s infinite ease-in-out}
      @keyframes rMove{
        0%,10%{transform:translateX(0)}
        45%{transform:translateX(205px)}
        75%,100%{transform:translateX(360px)}
      }
      @keyframes pulse{
        0%,20%{opacity:.15}
        45%{opacity:.9}
        80%,100%{opacity:.35}
      }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#26344d"/>
    </marker>
  </defs>

  <rect width="920" height="420" rx="18" class="panel"/>
  <text x="42" y="42" class="formula">离线二维数点：把 <tspan class="math">[l,r]</tspan> 拆成两个前缀</text>
  <text x="42" y="70" class="small">扫描右端点 <tspan class="math">r</tspan>，权值数据结构维护当前前缀中的 <tspan class="math">a_i</tspan> 分布</text>

  <g transform="translate(74 92)">
    <line x1="0" y1="260" x2="710" y2="260" class="axis" marker-end="url(#arrow)"/>
    <line x1="0" y1="260" x2="0" y2="18" class="axis" marker-end="url(#arrow)"/>
    <text x="720" y="266" class="label">位置 <tspan class="math">i</tspan></text>
    <text x="-34" y="10" class="math">a_i</text>

    <g opacity=".72">
      <line x1="85" y1="260" x2="85" y2="22" class="grid"/>
      <line x1="170" y1="260" x2="170" y2="22" class="grid"/>
      <line x1="255" y1="260" x2="255" y2="22" class="grid"/>
      <line x1="340" y1="260" x2="340" y2="22" class="grid"/>
      <line x1="425" y1="260" x2="425" y2="22" class="grid"/>
      <line x1="510" y1="260" x2="510" y2="22" class="grid"/>
      <line x1="595" y1="260" x2="595" y2="22" class="grid"/>
      <line x1="0" y1="210" x2="710" y2="210" class="grid"/>
      <line x1="0" y1="160" x2="710" y2="160" class="grid"/>
      <line x1="0" y1="110" x2="710" y2="110" class="grid"/>
      <line x1="0" y1="60" x2="710" y2="60" class="grid"/>
    </g>

    <rect x="0" y="98" width="540" height="162" rx="8" class="prefixR">
      <animate attributeName="width" values="170;375;540;540;170" dur="6.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="98" width="210" height="162" rx="8" class="prefixL"/>
    <rect x="210" y="160" width="330" height="100" rx="8" class="query"/>

    <line x1="210" y1="260" x2="210" y2="22" class="dash"/>
    <line x1="0" y1="160" x2="710" y2="160" class="dash"/>
    <text x="190" y="287" class="math">l-1</text>
    <text x="716" y="164" class="math">x</text>

    <circle cx="75" cy="205" r="6" class="point"/>
    <circle cx="145" cy="118" r="6" class="point"/>
    <circle cx="240" cy="192" r="6" class="point"/>
    <circle cx="320" cy="148" r="6" class="point"/>
    <circle cx="395" cy="222" r="6" class="point"/>
    <circle cx="478" cy="82" r="6" class="point"/>
    <circle cx="570" cy="174" r="6" class="point"/>
    <circle cx="625" cy="115" r="6" class="point"/>

    <g class="activePoints">
      <circle cx="240" cy="192" r="8" class="active"/>
      <circle cx="320" cy="148" r="8" class="active"/>
      <circle cx="395" cy="222" r="8" class="active"/>
    </g>

    <g class="scanGroup">
      <line x1="180" y1="20" x2="180" y2="262" class="scan"/>
      <text x="192" y="38" class="small">当前 <tspan class="math">r</tspan></text>
    </g>
  </g>

  <g transform="translate(610 306)">
    <rect x="0" y="0" width="270" height="74" rx="12" fill="#ffffff" stroke="#d7e0f0"/>
    <text x="18" y="30" class="math">Ans(l,r,x)</text>
    <text x="18" y="56" class="math">= Ans(1,r,x)-Ans(1,l-1,x)</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-label="扫描线维护矩形面积并动画">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2a44" flood-opacity=".14"/>
    </filter>
    <style>
      .panel{fill:url(#bg);stroke:#d7e0f0;stroke-width:1.2}
      .axis{stroke:#26344d;stroke-width:2.2;fill:none;stroke-linecap:round}
      .grid{stroke:#dbe4f3;stroke-width:1}
      .event{stroke:#8a97ad;stroke-width:1.4;stroke-dasharray:5 8}
      .rect1{fill:#4f7cff;fill-opacity:.22;stroke:#3451b2;stroke-width:2.2}
      .rect2{fill:#00a389;fill-opacity:.22;stroke:#00897b;stroke-width:2.2}
      .rect3{fill:#ffb020;fill-opacity:.24;stroke:#d98200;stroke-width:2.2}
      .slab{fill:#e03131;fill-opacity:.08}
      .scan{stroke:#e03131;stroke-width:3;stroke-linecap:round}
      .cover{stroke:#e03131;stroke-width:7;stroke-linecap:round;filter:url(#softShadow)}
      .dot{fill:#e03131}
      .label{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:17px;fill:#1f2937}
      .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:14px;fill:#526174}
      .formula{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:19px;font-weight:700;fill:#162033}
      .scanGroup{animation:scanMove 7.2s infinite ease-in-out}
      .cover1{animation:c1 7.2s infinite ease-in-out}
      .cover2{animation:c2 7.2s infinite ease-in-out}
      .cover3{animation:c3 7.2s infinite ease-in-out}
      @keyframes scanMove{
        0%,8%{transform:translateX(0)}
        28%{transform:translateX(125px)}
        48%{transform:translateX(220px)}
        68%{transform:translateX(285px)}
        88%,100%{transform:translateX(455px)}
      }
      @keyframes c1{
        0%,11%{opacity:0}
        16%,43%{opacity:1}
        48%,100%{opacity:0}
      }
      @keyframes c2{
        0%,27%{opacity:0}
        32%,73%{opacity:1}
        78%,100%{opacity:0}
      }
      @keyframes c3{
        0%,62%{opacity:0}
        68%,92%{opacity:1}
        100%{opacity:0}
      }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#26344d"/>
    </marker>
  </defs>

  <rect width="920" height="420" rx="18" class="panel"/>
  <text x="42" y="42" class="formula">扫描 x 轴事件，线段树维护当前 y 覆盖长度</text>
  <text x="42" y="70" class="small">红线移动到相邻事件之间时，该竖条贡献为 coveredY × Δx</text>

  <g transform="translate(70 88)">
    <line x1="0" y1="260" x2="710" y2="260" class="axis" marker-end="url(#arrow)"/>
    <line x1="0" y1="260" x2="0" y2="10" class="axis" marker-end="url(#arrow)"/>
    <text x="718" y="266" class="label">x</text>
    <text x="-20" y="0" class="label">y</text>

    <g opacity=".72">
      <line x1="85" y1="260" x2="85" y2="18" class="grid"/>
      <line x1="170" y1="260" x2="170" y2="18" class="grid"/>
      <line x1="255" y1="260" x2="255" y2="18" class="grid"/>
      <line x1="340" y1="260" x2="340" y2="18" class="grid"/>
      <line x1="425" y1="260" x2="425" y2="18" class="grid"/>
      <line x1="510" y1="260" x2="510" y2="18" class="grid"/>
      <line x1="595" y1="260" x2="595" y2="18" class="grid"/>
      <line x1="0" y1="205" x2="710" y2="205" class="grid"/>
      <line x1="0" y1="150" x2="710" y2="150" class="grid"/>
      <line x1="0" y1="95" x2="710" y2="95" class="grid"/>
      <line x1="0" y1="40" x2="710" y2="40" class="grid"/>
    </g>

    <rect x="70" y="125" width="220" height="105" rx="5" class="rect1"/>
    <rect x="195" y="52" width="235" height="145" rx="5" class="rect2"/>
    <rect x="355" y="150" width="175" height="80" rx="5" class="rect3"/>

    <line x1="70" y1="260" x2="70" y2="20" class="event"/>
    <line x1="195" y1="260" x2="195" y2="20" class="event"/>
    <line x1="290" y1="260" x2="290" y2="20" class="event"/>
    <line x1="355" y1="260" x2="355" y2="20" class="event"/>
    <line x1="430" y1="260" x2="430" y2="20" class="event"/>
    <line x1="530" y1="260" x2="530" y2="20" class="event"/>

    <g class="cover1">
      <line x1="72" y1="125" x2="72" y2="230" class="cover"/>
    </g>
    <g class="cover2">
      <line x1="72" y1="52" x2="72" y2="230" class="cover"/>
    </g>
    <g class="cover3">
      <line x1="72" y1="52" x2="72" y2="230" class="cover"/>
    </g>

    <g class="scanGroup">
      <rect x="70" y="20" width="58" height="240" rx="8" class="slab"/>
      <line x1="70" y1="18" x2="70" y2="262" class="scan"/>
      <circle cx="70" cy="18" r="4.5" class="dot"/>
      <text x="82" y="34" class="small">扫描线</text>
    </g>
  </g>

  <g transform="translate(665 118)">
    <rect x="0" y="0" width="205" height="156" rx="12" fill="#ffffff" stroke="#d7e0f0"/>
    <text x="18" y="34" class="label">线段树维护</text>
    <text x="18" y="66" class="small">1. 区间覆盖次数</text>
    <text x="18" y="94" class="small">2. 当前覆盖长度</text>
    <text x="18" y="122" class="small">3. 根节点即 coveredY</text>
  </g>
</svg>

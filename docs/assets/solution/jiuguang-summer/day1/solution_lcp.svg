<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260">
  <rect width="720" height="260" fill="white"/>
  <style>
    .box{fill:#eef5ff;stroke:#2e86c1;stroke-width:2}
    .drop{fill:#fbeee6;stroke:#d35400;stroke-width:2}
    .same{fill:#d5f5e3;stroke:#239b56;stroke-width:2}
    .txt{font-family:Consolas,'Microsoft YaHei',monospace;font-size:24px;fill:#222}
    .label{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;fill:#222}
    .arrow{stroke:#c0392b;stroke-width:3;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#c0392b"/>
    </marker>
  </defs>
  <text class="label" x="60" y="45">忽略前 l 个字符后比较 LCP</text>
  <text class="label" x="60" y="100">T:</text>
  <text class="label" x="60" y="165">S:</text>
  <g transform="translate(110,75)">
    <rect class="drop" x="0" y="0" width="45" height="45"/><text class="txt" x="12" y="31">a</text>
    <rect class="drop" x="45" y="0" width="45" height="45"/><text class="txt" x="57" y="31">b</text>
    <rect class="same" x="90" y="0" width="45" height="45"/><text class="txt" x="102" y="31">c</text>
    <rect class="same" x="135" y="0" width="45" height="45"/><text class="txt" x="147" y="31">b</text>
    <rect class="same" x="180" y="0" width="45" height="45"/><text class="txt" x="192" y="31">c</text>
  </g>
  <g transform="translate(110,140)">
    <rect class="drop" x="0" y="0" width="45" height="45"/><text class="txt" x="12" y="31">a</text>
    <rect class="drop" x="45" y="0" width="45" height="45"/><text class="txt" x="57" y="31">b</text>
    <rect class="same" x="90" y="0" width="45" height="45"/><text class="txt" x="102" y="31">c</text>
    <rect class="same" x="135" y="0" width="45" height="45"/><text class="txt" x="147" y="31">b</text>
    <rect class="box" x="180" y="0" width="45" height="45"/><text class="txt" x="192" y="31">a</text>
  </g>
  <line class="arrow" x1="205" y1="215" x2="205" y2="185"/>
  <text class="label" x="245" y="220">二分长度，用 Hash 或 SA 查询这一段是否相同</text>
  <text class="label" x="110" y="235">橙色：不可用前缀；绿色：当前匹配前缀</text>
</svg>

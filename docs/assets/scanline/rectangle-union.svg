<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" viewBox="0 0 820 360" role="img" aria-label="扫描线维护矩形面积并示意图">
  <defs>
    <style>
      .axis{stroke:#27324a;stroke-width:2;fill:none}
      .grid{stroke:#d7dce8;stroke-width:1}
      .rect-a{fill:#4f7cff;fill-opacity:.22;stroke:#3451b2;stroke-width:3}
      .rect-b{fill:#00a389;fill-opacity:.20;stroke:#00897b;stroke-width:3}
      .rect-c{fill:#f59f00;fill-opacity:.22;stroke:#d98200;stroke-width:3}
      .scan{stroke:#e03131;stroke-width:4}
      .event{stroke:#7c879f;stroke-width:2;stroke-dasharray:7 7}
      .cover{stroke:#e03131;stroke-width:8;stroke-linecap:round}
      .label{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;fill:#1f2937}
      .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;fill:#4b5563}
      .formula{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;fill:#111827;font-weight:700}
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#27324a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="360" fill="#ffffff"/>

  <line x1="72" y1="300" x2="660" y2="300" class="axis" marker-end="url(#arrow)"/>
  <line x1="72" y1="300" x2="72" y2="52" class="axis" marker-end="url(#arrow)"/>
  <text x="666" y="306" class="label">x</text>
  <text x="62" y="42" class="label">y</text>

  <g opacity=".65">
    <line x1="150" y1="300" x2="150" y2="58" class="grid"/>
    <line x1="230" y1="300" x2="230" y2="58" class="grid"/>
    <line x1="310" y1="300" x2="310" y2="58" class="grid"/>
    <line x1="390" y1="300" x2="390" y2="58" class="grid"/>
    <line x1="470" y1="300" x2="470" y2="58" class="grid"/>
    <line x1="550" y1="300" x2="550" y2="58" class="grid"/>
    <line x1="72" y1="240" x2="660" y2="240" class="grid"/>
    <line x1="72" y1="180" x2="660" y2="180" class="grid"/>
    <line x1="72" y1="120" x2="660" y2="120" class="grid"/>
  </g>

  <rect x="125" y="155" width="220" height="110" class="rect-a"/>
  <rect x="250" y="85" width="235" height="140" class="rect-b"/>
  <rect x="410" y="175" width="170" height="90" class="rect-c"/>

  <line x1="125" y1="300" x2="125" y2="58" class="event"/>
  <line x1="250" y1="300" x2="250" y2="58" class="event"/>
  <line x1="345" y1="300" x2="345" y2="58" class="event"/>
  <line x1="410" y1="300" x2="410" y2="58" class="event"/>
  <line x1="485" y1="300" x2="485" y2="58" class="event"/>
  <line x1="580" y1="300" x2="580" y2="58" class="event"/>

  <line x1="390" y1="300" x2="390" y2="58" class="scan"/>
  <line x1="392" y1="85" x2="392" y2="265" class="cover"/>

  <text x="350" y="330" class="label">当前扫描线</text>
  <text x="486" y="72" class="small">事件点：矩形左/右边界</text>
  <text x="438" y="158" class="small">线段树维护当前 y 覆盖长度</text>
  <text x="92" y="27" class="formula">每段贡献 = coveredY × Δx</text>
</svg>

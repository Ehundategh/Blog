site_name: Gioush OI Website
site_description: Ehundategh 维护的 OI 知识点与题解收录。

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

plugins:
  - search:
      lang:
        - zh
        - en
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - javascripts/katex.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css
  - stylesheets/extra.css

nav:
  - 首页: index.md
  - 数据结构:
      - 总览: data-structure/index.md
      - ST 表: data-structure/st-table.md
      - 线段树:
          - 总览: data-structure/segment-tree/index.md
          - 扫描线: data-structure/segment-tree/scanline.md
          - 双半群模型: data-structure/segment-tree/double-semigroup.md
  - 字符串:
      - 总览: string/index.md
  - 数学:
      - 总览: math/index.md
      - 抽象代数: math/abstract-algebra.md
  - 动态规划:
      - 总览: dp/index.md
  - 图论:
      - 总览: graph/index.md
      - 树上问题:
          - 总览: graph/tree/index.md
          - 树的直径: graph/tree/diameter.md
          - 树的重心: graph/tree/centroid.md
  - 计算几何:
      - 总览: geometry/index.md
  - 题目以及题解:
      - 总览: solution/index.md
  - 杂项:
      - 总览: misc/index.md
